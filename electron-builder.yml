appId: com.costbase.app
productName: CostBase
directories:
  output: release
  buildResources: resources
files:
  - dist/**/*
  - dist-electron/**/*
  - node_modules/**/*
  - package.json
win:
  target: nsis
  icon: resources/icon.ico
mac:
  target: dmg
  icon: resources/icon.icns
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
