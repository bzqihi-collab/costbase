name: Build

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci
      - run: npx vite build
      - run: npx electron-builder --win --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: CostBase-Windows
          path: release/CostBase Setup *.exe

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: rm -f package-lock.json && npm install
      - run: npx vite build
      - run: npx electron-builder --mac --publish never

      - name: Smoke test (mount DMG and verify app)
        run: |
          hdiutil attach release/*.dmg -mountpoint /tmp/costbase-test
          # Check app bundle integrity
          ls /tmp/costbase-test/CostBase.app/Contents/MacOS/CostBase
          # Verify it launches and exits cleanly (headless, limited)
          /tmp/costbase-test/CostBase.app/Contents/MacOS/CostBase --no-sandbox &
          APP_PID=$!
          sleep 5
          kill $APP_PID 2>/dev/null
          hdiutil detach /tmp/costbase-test
          echo "✅ macOS app smoke test passed"

      - uses: actions/upload-artifact@v4
        with:
          name: CostBase-macOS
          path: release/*.dmg
